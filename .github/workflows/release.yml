name: Create Release

on:
  push:
    tags:
      - 'v*'
      - 'release*'      # Добавить для release_beta и т.д.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Create Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Автоматический релиз. Подробности в описании коммита."
          makeLatest: true
          artifacts: "app/build/outputs/apk/release/*.apk"
          token: ${{ secrets.GITHUB_TOKEN }}